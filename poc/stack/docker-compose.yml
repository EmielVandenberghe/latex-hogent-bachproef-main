services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
      - '--web.enable-admin-api'

  grafana:
    image: grafana/grafana:11.5.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false

  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'

  loki:
    image: grafana/loki:3.4.2
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - ./loki.yml:/etc/loki/config.yml:ro
      - loki_data:/loki
    command:
      - '--config.file=/etc/loki/config.yml'

  promtail:
    image: grafana/promtail:3.4.2
    container_name: promtail
    restart: unless-stopped
    ports:
      - "1514:1514/udp"
    volumes:
      - ./promtail.yml:/etc/promtail/config.yml:ro
      - /var/log:/var/log:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command:
      - '--config.file=/etc/promtail/config.yml'
    depends_on:
      - loki

  blackbox-exporter:
    image: prom/blackbox-exporter:latest
    container_name: blackbox-exporter
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./blackbox.yml:/etc/blackbox-exporter/config.yml:ro
    command:
      - '--config.file=/etc/blackbox-exporter/config.yml'

  ping-exporter:
    build:
      context: .
      dockerfile: Dockerfile.ping
    container_name: ping-exporter
    restart: unless-stopped
    network_mode: host
    cap_add:
      - NET_RAW

  incontrol2-exporter:
    build: .
    container_name: incontrol2-exporter
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env

  srt-exporter:
    build:
      context: .
      dockerfile: Dockerfile.srt
    container_name: srt-exporter
    network_mode: host
    restart: unless-stopped
    environment:
      SRT_LISTEN_PORT: "9000"
      EXPORTER_PORT: "9117"

  ndi-exporter:
    build:
      context: .
      dockerfile: Dockerfile.ndi
    container_name: ndi-exporter
    network_mode: host
    restart: unless-stopped
    volumes:
      # NDI discovery vereist mDNS (Avahi). Host avahi-daemon via DBus/unix-socket exposen
      # aan de container zodat libavahi-client in de NDI SDK bronnen ziet.
      - /var/run/dbus:/var/run/dbus:ro
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
    environment:
      NDI_SOURCE_NAME: "NDI Test Stream"
      EXPORTER_PORT: "9118"
      COLLECT_INTERVAL: "5"
      NDI_EXTRA_IPS: "127.0.0.1"

  # Synthetische NDI-bron voor demo/scenario's — NIET deel van de observability stack zelf.
  # Vereist NDI SDK (Install_NDI_SDK_v5_Linux.tar.gz in poc/stack/).
  # Activeren: docker compose --profile demo up -d
  ndi-test-stream:
    build:
      context: .
      dockerfile: Dockerfile.ndi
    container_name: ndi-test-stream
    profiles: ["demo"]
    network_mode: host
    restart: unless-stopped
    volumes:
      # Sender publiceert via mDNS; host avahi-daemon toegankelijk maken.
      - /var/run/dbus:/var/run/dbus:ro
      - /var/run/avahi-daemon/socket:/var/run/avahi-daemon/socket
    environment:
      NDI_SOURCE_NAME: "NDI Test Stream"
      NDI_WIDTH: "1280"
      NDI_HEIGHT: "720"
      NDI_FPS_N: "25"
      NDI_FPS_D: "1"
    command: ["python", "-u", "ndi_sender.py"]
    depends_on:
      - ndi-exporter

  # Synthetische SRT-bron voor demo/scenario's — NIET deel van de observability stack zelf.
  # Opt-in via profile zodat baseline-metingen (CPU/RAM) de stack representeren zonder werklast.
  # Activeren: docker compose --profile demo up -d
  # In productie draait de encoder op dedicated hardware (camera/mixer), niet op de obs VM.
  srt-test-stream:
    image: linuxserver/ffmpeg:latest
    container_name: srt-test-stream
    profiles: ["demo"]
    network_mode: host
    restart: unless-stopped
    entrypoint: >
      ffmpeg -re
        -f lavfi -i "testsrc=size=1280x720:rate=25"
        -f lavfi -i "sine=frequency=1000:sample_rate=48000"
        -c:v libx264 -preset ultrafast -tune zerolatency
          -b:v 2000k -maxrate 2500k -bufsize 4000k
          -g 50 -keyint_min 50
        -c:a aac -b:a 128k
        -f mpegts "srt://127.0.0.1:9000?pkt_size=1316&mode=caller"
    depends_on:
      - srt-exporter

volumes:
  prometheus_data:
  grafana_data:
  loki_data:
