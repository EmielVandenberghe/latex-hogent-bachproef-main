apiVersion: 1

# Contact points
contactPoints:
  # Standaard Grafana notificatie — zichtbaar in Alerting UI
  - orgId: 1
    name: mediaventures-default
    receivers:
      - uid: mv-default
        type: email
        settings:
          addresses: admin@mediaventures.be
          singleEmail: false
        disableResolveMessage: false

  # Teams via Power Automate Workflow (webhook-type, NIET het verouderde MS Teams-type)
  # URL = Power Automate HTTP-trigger → Teams-kanaal "Observability-PoC"
  # Env-var TEAMS_WEBHOOK_URL ingesteld in .env (staat in .gitignore).
  - orgId: 1
    name: teams-webhook
    receivers:
      - uid: mv-teams
        type: webhook
        settings:
          url: ${TEAMS_WEBHOOK_URL}
          httpMethod: POST
        disableResolveMessage: false

# Notification policy
policies:
  - orgId: 1
    receiver: mediaventures-default
    group_by: ['alertname', 'device_name', 'site', 'device', 'source']
    group_wait: 30s
    group_interval: 5m
    repeat_interval: 4h
    routes:
      # Alle CRITICAL alerts → ook naar Teams (parallel aan default via continue: true)
      - receiver: teams-webhook
        matchers:
          - severity = critical
        group_wait: 10s
        group_interval: 5m
        repeat_interval: 4h
        continue: true
      # Streaming-gerelateerde WARNINGs (SRT / NDI / BirdDog) → ook naar Teams
      # severity = warning-matcher voorkomt dat CRITICAL streaming-alerts via
      # beide routes zouden passeren (zou dubbele Teams-notificatie geven).
      - receiver: teams-webhook
        matchers:
          - alertname =~ ".*SRT.*|.*NDI.*|.*BirdDog.*"
          - severity = warning
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 4h
        continue: true

# Alert rules
groups:
  - orgId: 1
    name: Peplink Infrastructure
    folder: Mediaventures Alerts
    interval: 1m
    rules:

      # Device offline via InControl2 API
      - uid: alert-device-offline
        title: "[CRITICAL] Device Offline"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - peplink_device_online) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "Device {{ $labels.device_name }} is offline"
          description: "Device {{ $labels.device_name }} rapporteert offline via InControl2 API voor meer dan 1 minuut."
        labels:
          severity: critical

      # PepVPN tunnel down
      - uid: alert-tunnel-down
        title: "[CRITICAL] PepVPN Tunnel Down"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - peplink_tunnel_up) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 3m
        annotations:
          summary: "PepVPN tunnel down op {{ $labels.device_name }}"
          description: "De PepVPN tunnel op {{ $labels.device_name }} is al meer dan 3 minuten verbroken. Monitoringverbinding met deze locatie riskeert te vallen."
        labels:
          severity: critical

      # ICMP probe failing (site onbereikbaar)
      - uid: alert-icmp-unreachable
        title: "[WARNING] Site onbereikbaar via ICMP"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - probe_success{job="blackbox_icmp"}) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "Site {{ $labels.site }} reageert niet op ICMP"
          description: "ICMP probe naar {{ $labels.instance }} ({{ $labels.site }}) faalt al meer dan 2 minuten. Mogelijke netwerkonderbreking."
        labels:
          severity: warning

      # Hoge latency (> 150ms)
      - uid: alert-high-latency
        title: "[WARNING] Hoge VPN-latency"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: probe_icmp_duration_seconds{phase="rtt", job="blackbox_icmp"} * 1000 > 150
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Hoge latency naar {{ $labels.site }}: {{ $value | printf \"%.0f\" }}ms"
          description: "ICMP RTT naar {{ $labels.site }} overschrijdt 150ms al meer dan 5 minuten. Impact op live-streaming kwaliteit mogelijk."
        labels:
          severity: warning

      # Hoog packet loss (> 5%)
      - uid: alert-high-packetloss
        title: "[WARNING] Hoog packet loss"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - avg_over_time(probe_success{job="blackbox_icmp"}[5m])) * 100 > 5
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Hoog packet loss naar {{ $labels.site }}: {{ $value | printf \"%.1f\" }}%"
          description: "Packet loss naar {{ $labels.site }} overschrijdt 5% over de laatste 5 minuten. SRT/NDI kwaliteit kan degraderen."
        labels:
          severity: warning

      # SRT stream packet loss (streaming-applicatielaag)
      - uid: alert-srt-packetloss
        title: "[WARNING] SRT Stream Packet Loss"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: srt_packet_loss_percent{stream_name=~".*"} > 5
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "SRT stream packet loss: {{ $value | printf \"%.1f\" }}%"
          description: "SRT stream packet loss overschrijdt 5% voor meer dan 1 minuut. Streamkwaliteit degradeert merkbaar."
        labels:
          severity: warning

      # NDI stream inactief (streaming-applicatielaag)
      - uid: alert-ndi-stream-down
        title: "[CRITICAL] NDI Stream Inactief"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - ndi_stream_active) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "NDI stream {{ $labels.source }} inactief"
          description: "De NDI-bron {{ $labels.source }} levert al meer dan 1 minuut geen frames. Controleer de sender of de mDNS-discovery."
        labels:
          severity: critical

      # WAN link down (enterprise SNMP — fysieke hardware)
      - uid: alert-wan-link-down
        title: "[WARNING] WAN Link Down"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - peplink_snmp_wan_link_up{wan_name="WAN"}) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "WAN link down op {{ $labels.device_name }}"
          description: "De primaire WAN-verbinding op {{ $labels.device_name }} ({{ $labels.ip }}) is al meer dan 2 minuten down."
        labels:
          severity: warning

      # Hoge CPU load (lokale API)
      - uid: alert-high-cpu
        title: "[WARNING] Hoge CPU Load"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: peplink_local_cpu_load_percent > 85
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Hoge CPU op {{ $labels.device_name }}: {{ $value | printf \"%.0f\" }}%"
          description: "CPU-gebruik op {{ $labels.device_name }} overschrijdt 85% al meer dan 5 minuten."
        labels:
          severity: warning

      # PepVPN: geen profielen geconfigureerd
      # Hardening tegen de historische blind-spot waarin een lege tunnel-lijst foutief als
      # "all healthy" werd gerapporteerd. Zie poc/monitoring_blindspot.md voor volledige analyse.
      # Deze regel firet zodra geen enkel device nog een PepVPN-profiel heeft — wat betekent dat
      # de tunnel-gezondheidsclaim van de observability stack niet meer geldig is.
      - uid: alert-pepvpn-no-profiles
        title: "[WARNING] Geen PepVPN profielen geconfigureerd"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: max(peplink_tunnel_count) < 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 5m
        annotations:
          summary: "Geen PepVPN profielen aanwezig op enig device"
          description: "De InControl2 API rapporteert 0 PepVPN-profielen voor alle devices. Tunnel-gezondheidsmonitoring is niet valideerbaar zolang er geen profielen bestaan. Controleer InControl2 → SpeedFusion VPN."
        labels:
          severity: warning

      # BirdDog device offline (REST API niet bereikbaar)
      - uid: alert-birddog-offline
        title: "[CRITICAL] BirdDog Device Offline"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - birddog_device_online) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: "BirdDog device {{ $labels.device }} offline"
          description: "BirdDog device {{ $labels.device }} reageert al meer dan 1 minuut niet op de REST API. Controleer de voeding en netwerkverbinding van het device."
        labels:
          severity: critical

      # BirdDog in decode-modus maar geen NDI-bron verbonden
      - uid: alert-birddog-decode-disconnected
        title: "[WARNING] BirdDog Decode Geen Bron"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: birddog_operation_mode_decode == 1 and birddog_decode_connected == 0 and birddog_device_online == 1
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "BirdDog {{ $labels.device }} in decode-modus maar geen NDI-bron"
          description: "BirdDog device {{ $labels.device }} staat in decode-modus maar is al meer dan 2 minuten niet verbonden met een NDI-bron. Controleer de NDI-bronnenlijst of het netwerk."
        labels:
          severity: warning

      # Exporter down
      - uid: alert-exporter-down
        title: "[CRITICAL] Observability Exporter Down"
        condition: A
        data:
          - refId: A
            queryType: ''
            relativeTimeRange:
              from: 300
              to: 0
            datasourceUid: prometheus
            model:
              expr: (1 - peplink_scrape_success) > 0
              instant: true
              intervalMs: 1000
              maxDataPoints: 43200
              refId: A
        noDataState: OK
        execErrState: Error
        for: 2m
        annotations:
          summary: "InControl2 exporter scrape mislukt"
          description: "De InControl2 exporter rapporteert scrape-fouten al meer dan 2 minuten. Controleer API credentials en netwerkverbinding."
        labels:
          severity: critical
