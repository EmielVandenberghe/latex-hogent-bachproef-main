global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'node-exporter'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'blackbox_icmp'
    metrics_path: /probe
    params:
      module: [icmp]
    static_configs:
      - targets: ['10.1.1.2']
        labels:
          site: 'Bornem'
      - targets: ['10.1.2.2']
        labels:
          site: 'Venue'
      - targets: ['10.1.3.2']
        labels:
          site: 'Live1'
      - targets: ['10.1.4.2']
        labels:
          site: 'Live2'
      # Live3 = fysieke Balance 20X, bereikbaar via WiFi-direct (192.168.1.1).
      # PepVPN-tunnel opgegeven wegens PrimeCare-catch-22 — zie primecare_pepvpn_blocker.md.
      - targets: ['192.168.1.1']
        labels:
          site: 'Live3'
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: 10.1.1.100:9115

  - job_name: 'ping_jitter'
    static_configs:
      - targets: ['10.1.1.100:9116']
    scrape_interval: 30s
    scrape_timeout: 25s

  - job_name: 'incontrol2'
    static_configs:
      - targets: ['10.1.1.100:8080']
    scrape_interval: 15s
    scrape_timeout: 10s

  - job_name: 'srt_exporter'
    static_configs:
      - targets: ['10.1.1.100:9117']
    scrape_interval: 15s
    scrape_timeout: 10s
